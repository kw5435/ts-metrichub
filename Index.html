<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MetricHub</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f8f8f8; font-size:16px; }
header { background:#333; color:white; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; }
header h1 { margin:0; font-size:28px; }
nav { display:flex; gap:10px; flex-wrap:wrap; }
nav button, nav .dropdown-btn { background:#555; color:white; border:none; padding:10px 15px; cursor:pointer; font-size:16px; }
nav button:hover, nav .dropdown-btn:hover { background:#777; }
.dropdown { position:relative; display:inline-block; }
.dropdown-content { display:none; position:absolute; background:#fff; min-width:160px; box-shadow:0 8px 16px rgba(0,0,0,0.2); z-index:1; }
.dropdown-content button { background:#fff; color:#333; width:100%; text-align:left; padding:10px; border:none; cursor:pointer; }
.dropdown-content button:hover { background:#eee; }
.dropdown:hover .dropdown-content { display:block; }

section { display:none; padding:20px; max-width:1920px; margin:auto; }
section.active { display:block; }

h2 { font-size:24px; margin-bottom:15px; }
h3 { font-size:20px; margin-top:20px; }

label, select, input, button { margin:5px; font-size:14px; }
select[multiple] { height:120px; }

table { width:100%; border-collapse: collapse; margin-bottom:20px; table-layout: fixed; font-size:14px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; word-wrap:break-word; }
th { background:#f0f0f0; }

canvas { max-width:100%; height:400px; margin-bottom:40px; }

.green { background-color:#a6f3a6; }
.red { background-color:#f3a6a6; }

@media print { body { font-size:12px; } canvas { height:250px !important; } table { font-size:12px; } }
</style>
</head>
<body>
<header>
<h1>MetricHub</h1>
<nav>
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('employee')">Mitarbeiter</button>
<button onclick="showTab('wizard')">Wizard</button>
<div class="dropdown">
  <button class="dropdown-btn">Systemverwaltung</button>
  <div class="dropdown-content">
    <button onclick="showTab('adminEmployees')">Mitarbeiterverwaltung</button>
    <button onclick="showTab('adminKPI')">KPI-Verwaltung</button>
  </div>
</div>
<button onclick="showTab('evaluation')">Auswertung</button>
<button onclick="exportData()">Datentransfer</button>
</nav>
</header>

<!-- Dashboard -->
<section id="dashboard" class="active">
<h2>Dashboard Gesamt-KPI</h2>
<label for="dashboardYear">Jahr:</label>
<select id="dashboardYear" onchange="updateDashboard()"></select>
<label for="kpiSelect">KPIs auswählen:</label>
<select id="kpiSelect" multiple size="5" onchange="updateDashboard()"></select>
<canvas id="dashboardChart"></canvas>
</section>

<!-- Mitarbeiter -->
<section id="employee">
<h2>Mitarbeiter KPIs</h2>
<label for="employeeSelect">Mitarbeiter:</label>
<select id="employeeSelect" onchange="updateEmployeeKPIs()"></select>
<label for="employeeYear">Jahr:</label>
<select id="employeeYear" onchange="updateEmployeeKPIs()"></select>
<label><input type="checkbox" id="editMode" onchange="toggleEditMode()"> Bearbeitungsmodus</label>
<div id="employeeKPITable"></div>
<canvas id="employeeChart"></canvas>
<button onclick="generateEvaluation()">Auswertung</button>
<div id="evaluationResult" style="margin-top:20px;"></div>
</section>

<!-- Wizard -->
<section id="wizard">
<h2>KPI Wizard</h2>
<div id="wizardContainer">
<label for="wizardEmployee">Mitarbeiter:</label>
<select id="wizardEmployee"></select>
<label for="wizardYear">Jahr:</label>
<select id="wizardYear"></select>
<label for="wizardMonth">Monat:</label>
<select id="wizardMonth"></select>
<div id="wizardKPIs"></div>
<button onclick="saveWizardData()">Speichern</button>
</div>
</section>

<!-- Admin Mitarbeiter -->
<section id="adminEmployees">
<h2>Mitarbeiterverwaltung</h2>
<input type="text" id="adminEmployeeName" placeholder="Name">
<input type="text" id="adminEmployeeBranch" placeholder="Filiale">
<select id="adminEmployeeStatus">
<option value="aktiv">aktiv</option>
<option value="inaktiv">inaktiv</option>
</select>
<button onclick="addAdminEmployee()">Hinzufügen</button>
<div id="employeeAdminTable"></div>
</section>

<!-- Admin KPI -->
<section id="adminKPI">
<h2>KPI-Verwaltung</h2>
<input type="text" id="kpiNameInput" placeholder="KPI Name">
<input type="number" id="kpiTargetInput" placeholder="Jahresziel">
<button onclick="addKPI()">Hinzufügen</button>
<div id="kpiAdminList"></div>
</section>

<!-- Gesamtauswertung -->
<section id="evaluation">
<h2>Gesamtauswertung</h2>
<button onclick="generateTotalEvaluation()">Gesamtauswertung druckbar</button>
<div id="totalEvaluationResult" style="margin-top:20px;"></div>
</section>

<script>
const monthNames=["01 - Januar","02 - Februar","03 - März","04 - April","05 - Mai","06 - Juni",
"07 - Juli","08 - August","09 - September","10 - Oktober","11 - November","12 - Dezember"];
let employees=[], kpiDefinitions=[];
let dashboardChart=null, employeeChart=null;

// Navigation
function showTab(tab){
['dashboard','employee','wizard','adminEmployees','adminKPI','evaluation'].forEach(id=>document.getElementById(id).classList.remove('active'));
document.getElementById(tab).classList.add('active');
}

// LocalStorage
function saveData(){ localStorage.setItem('metricHubData',JSON.stringify({employees,kpiDefinitions})); }
function loadData(){ const data=localStorage.getItem('metricHubData'); if(data){ try{ const obj=JSON.parse(data); employees=obj.employees||[]; kpiDefinitions=obj.kpiDefinitions||["Umsatz","Leads","Calls"]; }catch(e){console.warn(e);} }}

// Export
function exportData(){ const data=JSON.stringify({employees,kpiDefinitions},null,2); const blob=new Blob([data],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download="metricHub_data.json"; a.click(); }

// Init
function init(){
  loadData();
  const now=new Date();
  const yearNow=now.getFullYear();
  const dashYear=document.getElementById('dashboardYear'); dashYear.innerHTML='';
  for(let y=yearNow-5;y<=yearNow+1;y++){ const o=document.createElement('option'); o.value=o.textContent=y; if(y===yearNow) o.selected=true; dashYear.appendChild(o); }

  const kpiSelect=document.getElementById('kpiSelect'); kpiSelect.innerHTML=''; kpiDefinitions.forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=k; kpiSelect.appendChild(o); });

  updateEmployeeSelect();
  updateWizardDropdowns();
  updateKPIAdminList();
  updateEmployeeAdminTable();
  updateDashboard();
}
init();

const monthNames=["01 - Januar","02 - Februar","03 - März","04 - April","05 - Mai","06 - Juni",
"07 - Juli","08 - August","09 - September","10 - Oktober","11 - November","12 - Dezember"];

// Dashboard
function updateDashboard() {
    const year = document.getElementById('dashboardYear').value;
    const selectedKPIs = Array.from(document.getElementById('kpiSelect').selectedOptions).map(o=>o.value);
    const labels = monthNames;
    const datasets = [];
    selectedKPIs.forEach(kpi=>{
        let data = [];
        employees.forEach(emp=>{
            const empYear = emp.kpis[year] || {};
            const kpiData = empYear[kpi] ? empYear[kpi].values : {};
            for(let m=1;m<=12;m++){
                data[m-1]=(data[m-1]||0)+(kpiData[m]||0);
            }
        });
        datasets.push({label:kpi, data:data, borderColor=getRandomColor(), fill:false, tension:0.1});
    });
    if(dashboardChart) dashboardChart.destroy();
    const ctx = document.getElementById('dashboardChart').getContext('2d');
    dashboardChart = new Chart(ctx, {
        type:'line',
        data:{labels:labels,datasets:datasets},
        options:{responsive:true, plugins:{legend:{position:'top'}}}
    });
}

// Mitarbeiteransicht
function updateEmployeeKPIs(){
    const empIndex=document.getElementById('employeeSelect').selectedIndex;
    const year=document.getElementById('employeeYear').value;
    if(empIndex<0) return;
    const emp=employees[empIndex];
    if(!emp.kpis[year]) emp.kpis[year]={};
    const container=document.getElementById('employeeKPITable');
    container.innerHTML='';
    let table=document.createElement('table');
    let html='<tr><th>KPI</th>'+monthNames.map(m=>`<th>${m}</th>`).join('')+'</tr>';
    kpiDefinitions.forEach(kpi=>{
        if(!emp.kpis[year][kpi]) emp.kpis[year][kpi]={target:0, values:{}};
        html+='<tr><td>'+kpi+'</td>';
        for(let m=1;m<=12;m++){
            let val=emp.kpis[year][kpi].values[m]||0;
            if(document.getElementById('editMode').checked){
                html+='<td><input type="number" value="'+val+'" onchange="updateEmployeeValue('+empIndex+',\''+year+'\',\''+kpi+'\','+m+',this.value)"></td>';
            } else {
                let target=emp.kpis[year][kpi].target;
                let percent=target?val/target:0;
                let color=percent>=m/12?'green':'red';
                html+='<td class="'+color+'">'+val+'</td>';
            }
        }
        html+='</tr>';
    });
    table.innerHTML=html;
    container.appendChild(table);
    updateEmployeeChart(emp, year);
}

function updateEmployeeValue(empIndex, year, kpi, month, value){
    employees[empIndex].kpis[year][kpi].values[month]=parseFloat(value)||0;
    saveData();
    updateEmployeeKPIs();
}

function toggleEditMode(){
    updateEmployeeKPIs();
}

// Wizard
function updateWizardDropdowns(){
    const empSel=document.getElementById('wizardEmployee'); empSel.innerHTML='';
    employees.forEach((e,i)=>{const o=document.createElement('option'); o.value=i; o.textContent=e.name; empSel.appendChild(o);});
    const yearSel=document.getElementById('wizardYear'); yearSel.innerHTML='';
    const now=new Date(); for(let y=now.getFullYear()-5;y<=now.getFullYear()+1;y++){ const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===now.getFullYear()) o.selected=true; yearSel.appendChild(o);}
    const monthSel=document.getElementById('wizardMonth'); monthSel.innerHTML='';
    monthNames.forEach((m,i)=>{ const o=document.createElement('option'); o.value=i+1; o.textContent=m; if(i+1===now.getMonth()+1) o.selected=true; monthSel.appendChild(o);});
    updateWizardKPIs();
}

function updateWizardKPIs(){
    const container=document.getElementById('wizardKPIs'); container.innerHTML='';
    kpiDefinitions.forEach(kpi=>{
        container.innerHTML+='<label>'+kpi+' <input type="number" id="wizard_'+kpi+'"></label><br>';
    });
}

function saveWizardData(){
    const empIndex=document.getElementById('wizardEmployee').value;
    const year=document.getElementById('wizardYear').value;
    const month=document.getElementById('wizardMonth').value;
    const emp=employees[empIndex];
    if(!emp.kpis[year]) emp.kpis[year]={};
    kpiDefinitions.forEach(kpi=>{
        if(!emp.kpis[year][kpi]) emp.kpis[year][kpi]={target:0, values:{}};
        const val=parseFloat(document.getElementById('wizard_'+kpi).value)||0;
        emp.kpis[year][kpi].values[month]=val;
    });
    saveData();
    alert("Daten gespeichert");
}

// Mitarbeiter Admin
function addAdminEmployee(){
    const name=document.getElementById('adminEmployeeName').value.trim();
    const branch=document.getElementById('adminEmployeeBranch').value.trim();
    const status=document.getElementById('adminEmployeeStatus').value;
    if(!name||!branch){alert("Name und Filiale erforderlich");return;}
    employees.push({name,branch,status,kpis:{}});
    document.getElementById('adminEmployeeName').value=''; document.getElementById('adminEmployeeBranch').value='';
    updateEmployeeAdminTable(); updateEmployeeSelect(); updateWizardDropdowns(); saveData();
}

function updateEmployeeAdminTable(){
    const c=document.getElementById('employeeAdminTable'); c.innerHTML='';
    let t=document.createElement('table');
    let html='<tr><th>Name</th><th>Filiale</th><th>Status</th><th>Löschen</th></tr>';
    employees.forEach((e,i)=>{
        html+='<tr><td>'+e.name+'</td><td>'+e.branch+'</td><td><select onchange="updateEmployeeStatus('+i+',this.value)"><option value="aktiv" '+(e.status==='aktiv'?'selected':'')+'>aktiv</option><option value="inaktiv" '+(e.status==='inaktiv'?'selected':'')+'>inaktiv</option></select></td><td><button onclick="deleteEmployee('+i+')">Löschen</button></td></tr>';
    });
    t.innerHTML=html; c.appendChild(t);
}

function updateEmployeeStatus(i,s){employees[i].status=s; saveData(); updateEmployeeSelect(); updateWizardDropdowns();}
function deleteEmployee(i){employees.splice(i,1); saveData(); updateEmployeeAdminTable(); updateEmployeeSelect(); updateWizardDropdowns();}

// KPI Admin
function addKPI(){
    const name=document.getElementById('kpiNameInput').value.trim();
    const target=parseFloat(document.getElementById('kpiTargetInput').value)||0;
    if(!name) return;
    if(!kpiDefinitions.includes(name)) kpiDefinitions.push(name);
    employees.forEach(emp=>{ for(const year in emp.kpis){ if(!emp.kpis[year][name]) emp.kpis[year][name]={target,values:{}};} });
    document.getElementById('kpiNameInput').value=''; document.getElementById('kpiTargetInput').value='';
    updateKPIAdminList(); updateWizardKPIs(); updateEmployeeKPIs(); saveData();
}

function updateKPIAdminList(){
    const c=document.getElementById('kpiAdminList'); c.innerHTML='';
    kpiDefinitions.forEach((k,i)=>{ const div=document.createElement('div'); div.innerHTML=k+' <button onclick="deleteKPI('+i+')">Löschen</button>'; c.appendChild(div);});
}
function deleteKPI(i){
    const kpi=kpiDefinitions[i]; kpiDefinitions.splice(i,1);
    employees.forEach(e=>{for(const year in e.kpis) delete e.kpis[year][kpi];});
    updateKPIAdminList(); updateWizardKPIs(); saveData();
}

// Mitarbeiter Auswahl
function updateEmployeeSelect(){
    const sel=document.getElementById('employeeSelect'); sel.innerHTML='';
    employees.forEach((e,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=e.name; sel.appendChild(o);});
    const yearSel=document.getElementById('employeeYear'); yearSel.innerHTML='';
    const now=new Date(); for(let y=now.getFullYear()-5;y<=now.getFullYear()+1;y++){ const o=document.createElement('option'); o.value=y; o.textContent=y; if(y===now.getFullYear()) o.selected=true; yearSel.appendChild(o);}
}

// Charts
function getRandomColor(){ return '#'+Math.floor(Math.random()*16777215).toString(16);}
function updateEmployeeChart(emp, year){
    const labels=monthNames;
    const datasets=[];
    kpiDefinitions.forEach(kpi=>{
        if(!emp.kpis[year][kpi]) return;
        let data=[]; for(let m=1;m<=12;m++){ data.push(emp.kpis[year][kpi].values[m]||0);}
        datasets.push({label:kpi,data:data,borderColor:getRandomColor(),fill:false,tension:0.1});
    });
    const ctx=document.getElementById('employeeChart').getContext('2d');
    if(employeeChart) employeeChart.destroy();
    employeeChart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:datasets},options:{responsive:true,plugins:{legend:{position:'top'}}}});
}

// Auswertung pro Mitarbeiter
function generateEvaluation(){
    const empIndex=document.getElementById('employeeSelect').selectedIndex;
    const year=document.getElementById('employeeYear').value;
    if(empIndex<0) return;
    const emp=employees[empIndex];
    let html='<table><tr><th>KPI</th><th>Ziel</th><th>Erreicht</th><th>%</th><th>Status</th></tr>';
    kpiDefinitions.forEach(kpi=>{
        if(!emp.kpis[year][kpi]) emp.kpis[year][kpi]={target:0,values:{}};
        let sum=0; for(let m=1;m<=12;m++){ sum+=emp.kpis[year][kpi].values[m]||0;}
        let percent=emp.kpis[year][kpi].target?Math.round(sum/emp.kpis[year][kpi].target*100):0;
        let status=percent>=100?'Grün':'Rot';
        html+='<tr><td>'+kpi+'</td><td>'+emp.kpis[year][kpi].target+'</td><td>'+sum+'</td><td>'+percent+'%</td><td class="'+status.toLowerCase()+'">'+status+'</td></tr>';
    });
    html+='</table>';
    document.getElementById('evaluationResult').innerHTML=html;
}

// Gesamtauswertung
function generateTotalEvaluation(){
    const year=document.getElementById('dashboardYear').value;
    let html='<table><tr><th>Mitarbeiter</th><th>KPI</th><th>Ziel</th><th>Erreicht</th><th>%</th><th>Status</th></tr>';
    employees.forEach(emp=>{
        kpiDefinitions.forEach(kpi=>{
            if(!emp.kpis[year] || !emp.kpis[year][kpi]) return;
            let sum=0; for(let m=1;m<=12;m++) sum+=emp.kpis[year][kpi].values[m]||0;
            let percent=emp.kpis[year][kpi].target?Math.round(sum/emp.kpis[year][kpi].target*100):0;
            let status=percent>=100?'Grün':'Rot';
            html+='<tr><td>'+emp.name+'</td><td>'+kpi+'</td><td>'+emp.kpis[year][kpi].target+'</td><td>'+sum+'</td><td>'+percent+'%</td><td class="'+status.toLowerCase()+'">'+status+'</td></tr>';
        });
    });
    html+='</table>';
    document.getElementById('totalEvaluationResult').innerHTML=html;
}


</script>
</body>
</html>
